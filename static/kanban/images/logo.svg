  <path d="M20,20 Q28,28 36,36" fill="none" stroke="#AFA9EC" stroke-width="1.1" opacity="0.45"/>
  <path d="M52,20 Q44,28 36,36" fill="none" stroke="#AFA9EC" stroke-width="1.1" opacity="0.45"/>
  <path d="M20,52 Q28,44 36,36" fill="none" stroke="#AFA9EC" stroke-width="1.1" opacity="0.45"/>
  <path d="M52,52 Q44,44 36,36" fill="none" stroke="#AFA9EC" stroke-width="1.1" opacity="0.45"/>
