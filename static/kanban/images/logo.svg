  <circle cx="36" cy="4"  r="4.5" fill="#8B7FFF" stroke="white" stroke-width="1.5"/>
  <circle cx="4"  cy="36" r="4.0" fill="#8B7FFF" stroke="white" stroke-width="1.4"/>
  <circle cx="68" cy="36" r="4.0" fill="#8B7FFF" stroke="white" stroke-width="1.4"/>
  <circle cx="36" cy="68" r="4.5" fill="#6C5CE7" stroke="white" stroke-width="1.5"/>
  <circle cx="36" cy="36" r="5.5" fill="#8B7FFF" stroke="white" stroke-width="1.8"/>
  <circle cx="20" cy="20" r="3.5" fill="#C4BFFF" stroke="white" stroke-width="1.2"/>
  <circle cx="52" cy="20" r="3.5" fill="#C4BFFF" stroke="white" stroke-width="1.2"/>
