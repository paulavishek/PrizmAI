  <line x1="52" y1="20" x2="20" y2="52" stroke="#AFA9EC" stroke-width="0.8" opacity="0.30"/>
  <!-- Neural arcs — outer ring -->
  <path d="M36,4 Q50,20 52,20" fill="none" stroke="#7F77DD" stroke-width="1.6" opacity="0.70"/>
  <path d="M36,4 Q22,20 20,20" fill="none" stroke="#7F77DD" stroke-width="1.6" opacity="0.70"/>
  <path d="M20,20 Q10,28 4,36" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.60"/>
  <path d="M52,20 Q62,28 68,36" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.60"/>
  <path d="M4,36 Q10,44 20,52" fill="none" stroke="#378ADD" stroke-width="1.5" opacity="0.60"/>
  <path d="M68,36 Q62,44 52,52" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.60"/>
  <path d="M20,52 Q28,62 36,68" fill="none" stroke="#378ADD" stroke-width="1.5" opacity="0.60"/>
  <path d="M52,52 Q44,62 36,68" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.60"/>
